<script>
        // Simple timer logic for the text
        let timeLeft = 30;
        const timerElement = document.getElementById('timer-text');
        
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                // Pad with zero if single digit
                timerElement.innerText = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                
                // Add urgent styling when time is low
                if (timeLeft <= 5) {
                    timerElement.classList.add('text-error', 'animate-pulse');
                    timerElement.classList.remove('text-secondary');
                    document.querySelector('.countdown-circle').classList.add('text-error');
                    document.querySelector('.countdown-circle').classList.remove('text-secondary');
                }
            } else {
                clearInterval(countdown);
                timerElement.innerText = "00";
            }
        }, 1000);
    </script>
